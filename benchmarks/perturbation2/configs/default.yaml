# Default config for benchmarks/perturbation2/run_pipeline.py
#
# Usage:
#   python run_pipeline.py configs/default.yaml
#
# To run a variant, copy this file, edit, and point at the new file.
# Committed configs serve as the experiment log.

max_papers: 2
length: short          # short (2k-7k words) | medium (7k-17k) | long (>17k)

error_type: surface    # surface | formal | all
score_method: llm      # llm | fuzzy | semantic

perturb_model: google/gemini-3-flash-preview
score_model: google/gemini-3-flash-preview

review_models:
  - google/gemini-3-flash-preview

review_methods:
  - zero_shot
  - local
  - progressive

results_dir: benchmarks/perturbation2/results
